tasks:
  - name: event_detection
    input_schema: canonical_event_sequence
    label_schema: event_label
    metrics: [pr_auc, f1, precision_at_k]
    output_schema: event_score
  - name: session_classification
    input_schema: session_events
    label_schema: session_label
    metrics: [macro_f1, pr_auc]
    output_schema: session_prediction
  - name: early_warning
    input_schema: rolling_event_prefix
    label_schema: future_harm
    metrics: [lead_time_ms, recall_at_horizon]
    output_schema: warning_score
  - name: action_selection
    input_schema: policy_features
    label_schema: should_block
    metrics: [false_blocks_per_100k, policy_utility]
    output_schema: policy_action
  - name: harm_estimation
    input_schema: replay_pair
    label_schema: harm_delta
    metrics: [mae, rank_correlation]
    output_schema: harm_score
  - name: ood_detection
    input_schema: heldout_scenario
    label_schema: ood_unsafe
    metrics: [pr_auc, auroc]
    output_schema: ood_score
